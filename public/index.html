<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fruit Merge</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1b0a2e;
    --container: #2d1450;
    --wall: #5a2d82;
    --gold: #ffd700;
    --text: #f0e0ff;
    --text-dim: #8a6aaa;
    --danger: #ff4060;
    --glow: rgba(255, 215, 0, 0.3);
  }
  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: 'Fredoka', sans-serif;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: none;
  }
  body { display: flex; flex-direction: column; align-items: center; }

  /* ── HUD ────────────────────────────── */
  .hud {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 400px; padding: 8px 12px;
    font-weight: 700; font-size: 0.9em;
    gap: 8px;
  }
  .hud-col { display: flex; flex-direction: column; }
  .hud-score { color: var(--gold); font-size: 1.3em; }
  .hud-level { color: var(--text-dim); font-size: 0.85em; }
  .hud-next { display: flex; align-items: center; gap: 6px; font-size: 0.85em; color: var(--text-dim); }
  .hud-next-fruit { font-size: 1.4em; }
  .hud-controls { display: flex; gap: 6px; }
  .icon-btn {
    background: rgba(255,255,255,0.08);
    border: none; color: var(--text);
    width: 32px; height: 32px; border-radius: 8px;
    font-size: 1em; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .icon-btn:active { background: rgba(255,255,255,0.2); }
  .icon-btn.active { background: rgba(255,215,0,0.2); color: var(--gold); }

  /* ── Game area ──────────────────────── */
  .game-wrapper {
    position: relative;
    width: 100%; max-width: 400px;
    flex: 1;
    display: flex; flex-direction: column; align-items: center;
  }
  #game-canvas {
    display: block;
    border-radius: 0 0 12px 12px;
    background: var(--container);
    transition: transform 0s;
  }

  /* ── Drop guide ─────────────────────── */
  .drop-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    border-bottom: 2px dashed rgba(255,255,255,0.15);
    pointer-events: none;
    z-index: 5;
  }

  /* ── Combo flash ────────────────────── */
  .combo-flash {
    position: fixed; top: 30%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.8em; font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 20px var(--glow);
    pointer-events: none; z-index: 85;
    animation: comboPop 0.9s ease-out forwards;
  }
  @keyframes comboPop {
    0%   { opacity: 0; transform: translate(-50%, 0) scale(0.6); }
    20%  { opacity: 1; transform: translate(-50%, -10px) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
  }

  /* ── Pause overlay ──────────────────── */
  .pause-banner {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 2em; font-weight: 700; color: var(--text);
    background: rgba(10,5,20,0.7);
    padding: 16px 40px; border-radius: 16px;
    z-index: 95; pointer-events: none;
  }

  /* ── Screens ────────────────────────── */
  .overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10, 5, 20, 0.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; z-index: 100;
    overflow-y: auto; padding: 24px;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 2.4em; color: var(--gold);
    text-shadow: 0 0 20px var(--glow);
    text-align: center;
  }
  .overlay h2 { font-size: 1.6em; color: var(--text); }
  .overlay p { color: var(--text-dim); font-size: 1em; text-align: center; padding: 0 20px; }
  .overlay .score-big {
    font-size: 2em; color: var(--gold); font-weight: 700;
  }
  .new-best {
    color: var(--gold); font-weight: 700; font-size: 1.1em;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.06); }
  }

  /* ── High score board ───────────────── */
  .hs-board {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px 18px;
    min-width: 240px;
    max-width: 320px;
  }
  .hs-board h3 {
    color: var(--gold); font-size: 1em;
    text-align: center; margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .hs-row {
    display: flex; justify-content: space-between;
    padding: 4px 0;
    color: var(--text); font-size: 0.95em;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .hs-row:last-child { border-bottom: none; }
  .hs-row.current { color: var(--gold); font-weight: 700; }
  .hs-rank { color: var(--text-dim); margin-right: 12px; }
  .hs-empty { color: var(--text-dim); font-style: italic; text-align: center; padding: 8px; }

  .btn {
    font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 1.1em;
    border: none; border-radius: 14px; padding: 14px 36px; cursor: pointer;
    transition: transform 0.12s;
  }
  .btn:active { transform: scale(0.95); }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #ffaa00);
    color: #1b0a2e;
    box-shadow: 0 4px 16px rgba(255, 215, 0, 0.3);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.1);
    color: var(--text);
    font-size: 0.9em;
    padding: 10px 22px;
  }
  .btn-danger {
    background: var(--danger); color: #fff;
  }

  /* ── Level up banner ────────────────── */
  .level-banner {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 2em; font-weight: 700; color: var(--gold);
    text-shadow: 0 0 30px var(--glow);
    z-index: 90; pointer-events: none;
    animation: levelPop 1.5s ease-out forwards;
  }
  @keyframes levelPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -60%) scale(1); }
  }

  /* ── Explosion particles ────────────── */
  .particle {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 80;
  }

  /* ── Powerup glow ───────────────────── */
  .powerup-hint {
    color: var(--gold); font-size: 0.7em;
    margin-top: 2px;
  }

  /* ── Fruit guide ────────────────────── */
  .fruit-guide {
    display: flex; gap: 2px; justify-content: center; flex-wrap: wrap;
    padding: 4px 10px; font-size: 0.75em; color: var(--text-dim);
    max-width: 400px;
  }
  .fruit-guide span { opacity: 0.6; }
  .fruit-guide .arrow { margin: 0 1px; }
</style>
</head>
<body>

<div class="hud">
  <div class="hud-col">
    <div class="hud-score" id="score">0</div>
    <div class="hud-level" id="level">Level 1</div>
  </div>
  <div class="hud-col" style="text-align:center; flex:1; align-items:center;">
    <div class="hud-next">
      Next: <span class="hud-next-fruit" id="next-fruit"></span>
    </div>
    <div class="hud-level" id="goal-text">Goal: 500</div>
  </div>
  <div class="hud-col" style="align-items:flex-end;">
    <div class="hud-controls">
      <button class="icon-btn" id="btn-pause" onclick="togglePause()" title="Pause">⏸</button>
      <button class="icon-btn" id="btn-mute" onclick="toggleMute()" title="Mute">🔊</button>
    </div>
    <div class="hud-level" id="best-text">Best: 0</div>
  </div>
</div>

<div class="fruit-guide" id="fruit-guide"></div>

<div class="game-wrapper" id="game-wrapper">
  <div class="drop-line"></div>
  <canvas id="game-canvas"></canvas>
</div>

<!-- START SCREEN -->
<div class="overlay" id="screen-start">
  <h1>🍉 Fruit Merge</h1>
  <p>Drop fruits to merge them!<br>Two same fruits combine into a bigger one.<br>Make a watermelon and watch it explode! 💥</p>
  <div class="hs-board" id="start-hs-board"></div>
  <button class="btn btn-gold" onclick="startGame()">Play!</button>
</div>

<!-- LEVEL UP SCREEN -->
<div class="overlay hidden" id="screen-levelup">
  <h1>⭐ Level Up!</h1>
  <h2 id="levelup-text">Level 2</h2>
  <div class="score-big" id="levelup-score">1000</div>
  <p id="levelup-msg">Things are getting trickier...</p>
  <button class="btn btn-gold" onclick="nextLevel()">Continue</button>
</div>

<!-- GAME OVER -->
<div class="overlay hidden" id="screen-gameover">
  <h1>💔 Game Over</h1>
  <div class="score-big" id="gameover-score">0</div>
  <p id="gameover-level">Reached Level 3</p>
  <div id="gameover-newbest" class="new-best hidden">🏆 NEW HIGH SCORE!</div>
  <div class="hs-board" id="gameover-hs-board"></div>
  <button class="btn btn-gold" onclick="restartGame()">Try Again</button>
  <button class="btn btn-secondary" onclick="goToStart()">Main Menu</button>
</div>

<script>
// ── Matter.js setup ───────────────────────
var Engine = Matter.Engine,
    Render = Matter.Render,
    Runner = Matter.Runner,
    Bodies = Matter.Bodies,
    Body = Matter.Body,
    Composite = Matter.Composite,
    Events = Matter.Events,
    Vector = Matter.Vector;

// ── Fruit definitions ─────────────────────
// visualScale lets specific emojis render bigger than their physics circle
// (some emoji glyphs have lots of internal whitespace, e.g. 🍍 leaves)
var FRUITS = [
  { emoji: '🍒', name: 'Cherry',      radius: 11, points: 1,   color: '#e74c3c' },
  { emoji: '🍓', name: 'Strawberry',   radius: 14, points: 3,   color: '#ff6b81' },
  { emoji: '🍇', name: 'Grape',        radius: 17, points: 6,   color: '#8e44ad' },
  { emoji: '🍊', name: 'Orange',       radius: 20, points: 10,  color: '#f39c12' },
  { emoji: '🍑', name: 'Peach',        radius: 23, points: 15,  color: '#fdcb6e' },
  { emoji: '🍎', name: 'Apple',        radius: 26, points: 21,  color: '#e74c3c' },
  { emoji: '🍐', name: 'Pear',         radius: 29, points: 28,  color: '#a8e06c' },
  { emoji: '🍋', name: 'Lemon',        radius: 33, points: 36,  color: '#f9e74a' },
  { emoji: '🍍', name: 'Pineapple',    radius: 41, points: 45,  color: '#f0b429', visualScale: 1.25 },
  { emoji: '🍈', name: 'Melon',        radius: 45, points: 55,  color: '#7bed9f' },
  { emoji: '🍉', name: 'Watermelon',   radius: 50, points: 100, color: '#2ed573' }
];

// ── Power-ups ─────────────────────────────
var POWERUPS = {
  BOMB: { emoji: '💣', name: 'Bomb',  hint: 'Clears nearby fruits' },
  STAR: { emoji: '⭐', name: 'Magic', hint: 'Upgrades 3 random fruits' }
};
var POWERUP_KEYS = Object.keys(POWERUPS);

// ── Game state ────────────────────────────
var engine, render, runner;
var score = 0;
var level = 1;
var currentFruitIndex = 0;
var nextFruitIndex = 0;
var currentPowerUp = null; // 'BOMB' | 'STAR' | null — overrides fruit
var nextPowerUp = null;
var canDrop = true;
var gameOver = false;
var gameStarted = false;
var paused = false;
var muted = false;
var containerWidth, containerHeight;
var checkGameOverTimeout = null;
var lastMergeTime = 0;
var combo = 0;
var bestScore = 0;

// Level thresholds — higher base + steeper curve so leveling takes longer
function getLevelGoal(lvl) {
  return Math.floor(600 * Math.pow(1.7, lvl - 1));
}

// Max fruit index that can be dropped (increases slightly with level)
function getMaxDropIndex(lvl) {
  return Math.min(3 + Math.floor(lvl / 3), 5);
}

// Fruits get bigger as level rises (capped)
function levelScale() {
  return Math.min(1 + (level - 1) * 0.06, 1.35);
}
function getRadius(idx) {
  return FRUITS[idx].radius * levelScale();
}

// ── Audio ─────────────────────────────────
var audioCtx = null;
function getCtx() {
  if (muted) return null;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playMergeSound(fruitIndex) {
  var ctx = getCtx(); if (!ctx) return;
  try {
    var freq = 300 + fruitIndex * 80;
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(freq, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq * 1.5, ctx.currentTime + 0.1);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.25);
    var o2 = ctx.createOscillator();
    var g2 = ctx.createGain();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(freq * 2, ctx.currentTime + 0.05);
    g2.gain.setValueAtTime(0.08, ctx.currentTime + 0.05);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o2.connect(g2); g2.connect(ctx.destination);
    o2.start(ctx.currentTime + 0.05); o2.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}

function playDropSound() {
  var ctx = getCtx(); if (!ctx) return;
  try {
    var bufSize = ctx.sampleRate * 0.05;
    var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 3);
    var n = ctx.createBufferSource(); n.buffer = buf;
    var g = ctx.createGain();
    g.gain.setValueAtTime(0.12, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    var f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1000; f.Q.value = 1;
    n.connect(f); f.connect(g); g.connect(ctx.destination);
    n.start(ctx.currentTime); n.stop(ctx.currentTime + 0.07);
  } catch(e) {}
}

function playExplosionSound(mega) {
  var ctx = getCtx(); if (!ctx) return;
  try {
    var dur = mega ? 1.0 : 0.6;
    var loud = mega ? 0.4 : 0.25;
    // Big boom
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(mega ? 70 : 100, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(15, ctx.currentTime + dur * 0.8);
    g.gain.setValueAtTime(loud, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + dur + 0.1);
    // Crackle
    var bufSize = Math.floor(ctx.sampleRate * dur * 0.7);
    var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2) * 0.6;
    var n = ctx.createBufferSource(); n.buffer = buf;
    var ng = ctx.createGain();
    ng.gain.setValueAtTime(mega ? 0.3 : 0.2, ctx.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur * 0.85);
    n.connect(ng); ng.connect(ctx.destination);
    n.start(ctx.currentTime); n.stop(ctx.currentTime + dur);
    // Rising sparkle
    var sparkleCount = mega ? 6 : 3;
    for (var k = 0; k < sparkleCount; k++) {
      (function(t) {
        var s = ctx.createOscillator();
        var sg = ctx.createGain();
        s.type = 'sine';
        s.frequency.setValueAtTime(800 + Math.random() * 1200, ctx.currentTime + t);
        sg.gain.setValueAtTime(0.1, ctx.currentTime + t);
        sg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18);
        s.connect(sg); sg.connect(ctx.destination);
        s.start(ctx.currentTime + t); s.stop(ctx.currentTime + t + 0.22);
      })(0.05 + k * 0.08);
    }
  } catch(e) {}
}

function playLevelUpSound() {
  var ctx = getCtx(); if (!ctx) return;
  try {
    [523, 659, 784, 1047].forEach(function(f, i) {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.12);
      g.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.25);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + i * 0.12); o.stop(ctx.currentTime + i * 0.12 + 0.3);
    });
  } catch(e) {}
}

function playGameOverSound() {
  var ctx = getCtx(); if (!ctx) return;
  try {
    [400, 350, 300, 200].forEach(function(f, i) {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.2);
      g.gain.setValueAtTime(0.08, ctx.currentTime + i * 0.2);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.2 + 0.25);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + i * 0.2); o.stop(ctx.currentTime + i * 0.2 + 0.3);
    });
  } catch(e) {}
}

// Soft tick for wall/floor bounces — rate-limited
var lastBounceTime = 0;
function playBounceSound(intensity) {
  var ctx = getCtx(); if (!ctx) return;
  var now = performance.now();
  if (now - lastBounceTime < 60) return; // throttle
  lastBounceTime = now;
  try {
    var vol = Math.min(0.15, 0.04 + intensity * 0.02);
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(180 + intensity * 25, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.08);
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.12);
  } catch(e) {}
}

// Rising combo chime — pitch climbs with combo count
function playComboSound(comboCount) {
  var ctx = getCtx(); if (!ctx) return;
  try {
    var base = 440;
    var freq = base * Math.pow(1.122, Math.min(comboCount, 12)); // semitone steps
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(freq, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq * 1.4, ctx.currentTime + 0.12);
    g.gain.setValueAtTime(0.18, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.3);
    // Soft sparkle layer
    var s = ctx.createOscillator();
    var sg = ctx.createGain();
    s.type = 'sine';
    s.frequency.setValueAtTime(freq * 2, ctx.currentTime + 0.05);
    sg.gain.setValueAtTime(0.08, ctx.currentTime + 0.05);
    sg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    s.connect(sg); sg.connect(ctx.destination);
    s.start(ctx.currentTime + 0.05); s.stop(ctx.currentTime + 0.25);
  } catch(e) {}
}

// Pulsing danger warning when fruits near the top
function playDangerWarning() {
  var ctx = getCtx(); if (!ctx) return;
  try {
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(660, ctx.currentTime);
    g.gain.setValueAtTime(0.05, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.22);
  } catch(e) {}
}

// Celebratory fanfare for new high score
function playNewHighScoreSound() {
  var ctx = getCtx(); if (!ctx) return;
  try {
    var notes = [523, 659, 784, 1047, 1319, 1568];
    notes.forEach(function(f, i) {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.09);
      g.gain.setValueAtTime(0.18, ctx.currentTime + i * 0.09);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.09 + 0.4);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + i * 0.09); o.stop(ctx.currentTime + i * 0.09 + 0.45);
    });
    // Sparkles on top
    for (var k = 0; k < 6; k++) {
      (function(t) {
        var s = ctx.createOscillator();
        var sg = ctx.createGain();
        s.type = 'sine';
        s.frequency.setValueAtTime(1500 + Math.random() * 1500, ctx.currentTime + t);
        sg.gain.setValueAtTime(0.07, ctx.currentTime + t);
        sg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.2);
        s.connect(sg); sg.connect(ctx.destination);
        s.start(ctx.currentTime + t); s.stop(ctx.currentTime + t + 0.25);
      })(0.3 + k * 0.08);
    }
  } catch(e) {}
}

// UI button click
function playClickSound() {
  var ctx = getCtx(); if (!ctx) return;
  try {
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.05);
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.07);
  } catch(e) {}
}

function playPowerUpSound() {
  var ctx = getCtx(); if (!ctx) return;
  try {
    [659, 880, 1175].forEach(function(f, i) {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.06);
      g.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.06);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.06 + 0.2);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + i * 0.06); o.stop(ctx.currentTime + i * 0.06 + 0.25);
    });
  } catch(e) {}
}

// ── Screen shake ──────────────────────────
var shakeUntil = 0;
var shakeIntensity = 0;
function shake(intensity, duration) {
  shakeIntensity = Math.max(shakeIntensity, intensity);
  shakeUntil = Math.max(shakeUntil, performance.now() + duration);
}
(function shakeLoop() {
  requestAnimationFrame(shakeLoop);
  var canvas = document.getElementById('game-canvas');
  if (!canvas) return;
  var now = performance.now();
  if (now < shakeUntil) {
    var amp = shakeIntensity * Math.max(0, (shakeUntil - now) / 400);
    canvas.style.transform = 'translate(' + ((Math.random() * 2 - 1) * amp) + 'px, ' + ((Math.random() * 2 - 1) * amp) + 'px)';
  } else {
    if (shakeIntensity !== 0) {
      canvas.style.transform = '';
      shakeIntensity = 0;
    }
  }
})();

// ── Explosion particles ───────────────────
function spawnExplosion(x, y, intensity) {
  intensity = intensity || 1;
  var colors = ['#ff6b6b','#ffd93d','#6bff6b','#6bb5ff','#ff6bff','#ff9f43','#ee5a24','#ff4757'];
  var count = Math.floor(30 * intensity);
  var maxDist = 80 + 70 * intensity;
  var maxSize = 6 + 14 * intensity;
  for (var i = 0; i < count; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var size = 6 + Math.random() * maxSize;
    var angle = Math.random() * Math.PI * 2;
    var dist = 40 + Math.random() * maxDist;
    var dx = Math.cos(angle) * dist;
    var dy = Math.sin(angle) * dist - 60;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.boxShadow = '0 0 ' + (size * 0.6) + 'px ' + colors[Math.floor(Math.random() * colors.length)];
    document.body.appendChild(p);
    var startTime = performance.now();
    (function(el, sx, sy, ddx, ddy, dur) {
      function anim(now) {
        var t = (now - startTime) / dur;
        if (t >= 1) { el.remove(); return; }
        el.style.left = (sx + ddx * t) + 'px';
        el.style.top = (sy + ddy * t - 50 * t) + 'px';
        el.style.opacity = 1 - t;
        el.style.transform = 'scale(' + (1 - t * 0.5) + ')';
        requestAnimationFrame(anim);
      }
      requestAnimationFrame(anim);
    })(p, x, y, dx, dy, (600 + Math.random() * 400) * Math.min(intensity, 2));
  }
}

// ── Combo flash ───────────────────────────
function showComboFlash(comboCount, multiplier) {
  var el = document.createElement('div');
  el.className = 'combo-flash';
  el.textContent = 'COMBO x' + comboCount + ' (' + multiplier.toFixed(1) + 'x)';
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 900);
}

// ── Initialize game ───────────────────────
function initGame() {
  var canvas = document.getElementById('game-canvas');

  containerWidth = Math.min(400, window.innerWidth);
  var hudHeight = document.querySelector('.hud').offsetHeight;
  var guideHeight = document.getElementById('fruit-guide').offsetHeight;
  containerHeight = window.innerHeight - hudHeight - guideHeight - 10;

  canvas.width = containerWidth;
  canvas.height = containerHeight;
  canvas.style.width = containerWidth + 'px';
  canvas.style.height = containerHeight + 'px';

  engine = Engine.create();
  engine.gravity.y = 1.5;

  render = Render.create({
    canvas: canvas,
    engine: engine,
    options: {
      width: containerWidth,
      height: containerHeight,
      wireframes: false,
      background: 'transparent',
      pixelRatio: 1
    }
  });

  var wallThickness = 20;
  var wallColor = '#5a2d82';
  var floorColor = '#3d1a6e';
  var floorOffset = 50;

  Composite.add(engine.world, [
    Bodies.rectangle(containerWidth / 2, containerHeight - floorOffset + wallThickness / 2, containerWidth, wallThickness, {
      isStatic: true, render: { fillStyle: floorColor }, label: 'wall'
    }),
    Bodies.rectangle(-wallThickness / 2, containerHeight / 2, wallThickness, containerHeight * 2, {
      isStatic: true, render: { fillStyle: wallColor }, label: 'wall'
    }),
    Bodies.rectangle(containerWidth + wallThickness / 2, containerHeight / 2, wallThickness, containerHeight * 2, {
      isStatic: true, render: { fillStyle: wallColor }, label: 'wall'
    })
  ]);

  Events.on(engine, 'collisionStart', handleCollision);
  Events.on(engine, 'collisionActive', handleCollision);
  Events.on(engine, 'collisionStart', handleBounceSound);
  Events.on(render, 'afterRender', drawFruitEmojis);

  Render.run(render);
  runner = Runner.create();
  Runner.run(runner, engine);

  buildFruitGuide();
}

function buildFruitGuide() {
  var el = document.getElementById('fruit-guide');
  var html = '';
  for (var i = 0; i < FRUITS.length; i++) {
    if (i > 0) html += '<span class="arrow">→</span>';
    html += '<span>' + FRUITS[i].emoji + '</span>';
  }
  html += '<span class="arrow">→</span><span>💥</span>';
  el.innerHTML = html;
}

// ── Drawing emojis on fruits ──────────────
function drawFruitEmojis() {
  var ctx = render.context;
  var bodies = Composite.allBodies(engine.world);

  for (var i = 0; i < bodies.length; i++) {
    var body = bodies[i];
    if (body.fruitIndex === undefined) continue;

    // Use the body's actual physics radius (which already includes level scaling)
    var r = body.circleRadius || FRUITS[body.fruitIndex].radius;
    var vScale = FRUITS[body.fruitIndex].visualScale || 1;
    var fontSize = Math.max(r * 2.6 * vScale, 18);

    ctx.save();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#000';
    ctx.translate(body.position.x, body.position.y);
    ctx.font = fontSize + 'px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(FRUITS[body.fruitIndex].emoji, 0, 1);
    ctx.restore();
  }
}

// ── Drop preview fruit ────────────────────
var previewX = 0;
function previewRadius() {
  return currentPowerUp ? 22 : getRadius(currentFruitIndex);
}
function updatePreview(x) {
  var r = previewRadius();
  previewX = Math.max(r + 5, Math.min(x, containerWidth - r - 5));
}

// ── Handle input ──────────────────────────
function setupInput() {
  var canvas = document.getElementById('game-canvas');

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    updatePreview(e.touches[0].clientX - rect.left);
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    updatePreview(e.touches[0].clientX - rect.left);
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    dropFruit(previewX);
  }, { passive: false });

  canvas.addEventListener('mousemove', function(e) {
    var rect = canvas.getBoundingClientRect();
    updatePreview(e.clientX - rect.left);
  });

  canvas.addEventListener('click', function(e) {
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left;
    updatePreview(x);
    dropFruit(previewX);
  });
}

// ── Roll the next drop (could be a power-up) ──
function rollNextDrop() {
  // Power-ups unlock at level 2; ~7% chance to roll a power-up
  if (level >= 2 && Math.random() < 0.07) {
    return { powerUp: POWERUP_KEYS[Math.floor(Math.random() * POWERUP_KEYS.length)] };
  }
  return { fruitIndex: Math.floor(Math.random() * (getMaxDropIndex(level) + 1)) };
}

function applyNextToCurrent() {
  currentFruitIndex = nextFruitIndex;
  currentPowerUp = nextPowerUp;
  var roll = rollNextDrop();
  if (roll.powerUp) {
    nextPowerUp = roll.powerUp;
    nextFruitIndex = 0;
  } else {
    nextPowerUp = null;
    nextFruitIndex = roll.fruitIndex;
  }
  updateNextDisplay();
}

function updateNextDisplay() {
  var el = document.getElementById('next-fruit');
  if (currentPowerUp) {
    el.textContent = POWERUPS[currentPowerUp].emoji;
    el.title = POWERUPS[currentPowerUp].hint;
  } else {
    el.textContent = FRUITS[currentFruitIndex].emoji;
    el.title = '';
  }
}

// ── Drop a fruit (or trigger power-up) ────
function dropFruit(x) {
  if (!canDrop || gameOver || !gameStarted || paused) return;

  if (currentPowerUp) {
    triggerPowerUp(currentPowerUp, x);
    canDrop = false;
    applyNextToCurrent();
    setTimeout(function() {
      canDrop = true;
      scheduleGameOverCheck();
    }, 500);
    return;
  }

  var r = getRadius(currentFruitIndex);
  x = Math.max(r + 5, Math.min(x, containerWidth - r - 5));

  var body = Bodies.circle(x, 40, r, {
    restitution: 0.2,
    friction: 0.5,
    density: 0.001 + currentFruitIndex * 0.0005,
    render: {
      fillStyle: 'rgba(0,0,0,0.01)',
      strokeStyle: 'rgba(0,0,0,0)',
      lineWidth: 0
    },
    label: 'fruit'
  });
  body.fruitIndex = currentFruitIndex;
  body.justDropped = true;

  setTimeout(function() { body.justDropped = false; }, 200);

  Composite.add(engine.world, body);
  playDropSound();

  canDrop = false;
  applyNextToCurrent();

  setTimeout(function() {
    canDrop = true;
    scheduleGameOverCheck();
  }, 600);
}

// ── Power-up triggers ─────────────────────
function triggerPowerUp(kind, x) {
  playPowerUpSound(kind);
  var canvas = document.getElementById('game-canvas');
  var rect = canvas.getBoundingClientRect();

  if (kind === 'BOMB') {
    // Drop point is roughly the top — explode at lower portion of column
    var by = containerHeight * 0.6;
    spawnExplosion(rect.left + x, rect.top + by, 1.4);
    shake(8, 350);
    var blastRadius = 110;
    var allBodies = Composite.allBodies(engine.world).slice();
    var scored = 0;
    for (var b = 0; b < allBodies.length; b++) {
      if (allBodies[b].fruitIndex === undefined) continue;
      var dist = Vector.magnitude(Vector.sub(allBodies[b].position, { x: x, y: by }));
      if (dist < blastRadius) {
        scored += FRUITS[allBodies[b].fruitIndex].points;
        Composite.remove(engine.world, allBodies[b]);
      }
    }
    score += scored;
    updateHUD();
  } else if (kind === 'STAR') {
    // Upgrade up to 3 random fruits one tier
    var allBodies = Composite.allBodies(engine.world).filter(function(b) {
      return b.fruitIndex !== undefined && b.fruitIndex < FRUITS.length - 1;
    });
    // Shuffle
    allBodies.sort(function() { return Math.random() - 0.5; });
    var upgrades = Math.min(3, allBodies.length);
    for (var i = 0; i < upgrades; i++) {
      var b = allBodies[i];
      var newIdx = b.fruitIndex + 1;
      var pos = b.position;
      Composite.remove(engine.world, b);
      var newR = getRadius(newIdx);
      var nb = Bodies.circle(pos.x, pos.y, newR, {
        restitution: 0.2,
        friction: 0.5,
        density: 0.001 + newIdx * 0.0005,
        render: { fillStyle: 'rgba(0,0,0,0.01)', strokeStyle: 'rgba(0,0,0,0)', lineWidth: 0 },
        label: 'fruit'
      });
      nb.fruitIndex = newIdx;
      nb.justDropped = true;
      setTimeout((function(bb) { return function() { bb.justDropped = false; }; })(nb), 100);
      Composite.add(engine.world, nb);
      score += FRUITS[newIdx].points;
      // Sparkle at each upgrade
      spawnExplosion(rect.left + pos.x, rect.top + pos.y, 0.5);
    }
    updateHUD();
  }
}

// ── Bounce sound on wall/floor impact ─────
function handleBounceSound(event) {
  var pairs = event.pairs;
  for (var i = 0; i < pairs.length; i++) {
    var p = pairs[i];
    var fruit = null, wall = null;
    if (p.bodyA.label === 'fruit' && p.bodyB.label === 'wall') { fruit = p.bodyA; wall = p.bodyB; }
    else if (p.bodyB.label === 'fruit' && p.bodyA.label === 'wall') { fruit = p.bodyB; wall = p.bodyA; }
    if (!fruit) continue;
    var speed = Vector.magnitude(fruit.velocity);
    if (speed < 2) continue; // ignore gentle contacts
    playBounceSound(speed);
  }
}

// ── Combo system ──────────────────────────
function registerMerge(rawPoints) {
  var now = performance.now();
  if (now - lastMergeTime < 1500) {
    combo++;
  } else {
    combo = 0;
  }
  lastMergeTime = now;
  var multiplier = 1 + combo * 0.2;
  var awarded = Math.floor(rawPoints * multiplier);
  score += awarded;
  if (combo >= 2) {
    showComboFlash(combo, multiplier);
    playComboSound(combo);
  }
  return awarded;
}

// ── Collision / Merge ─────────────────────
function handleCollision(event) {
  var pairs = event.pairs;

  for (var i = 0; i < pairs.length; i++) {
    var pair = pairs[i];
    var bodyA = pair.bodyA;
    var bodyB = pair.bodyB;

    if (bodyA.fruitIndex === undefined || bodyB.fruitIndex === undefined) continue;
    if (bodyA.fruitIndex !== bodyB.fruitIndex) continue;
    if (bodyA.merging || bodyB.merging) continue;
    if (bodyA.justDropped || bodyB.justDropped) continue;

    var fruitIdx = bodyA.fruitIndex;

    bodyA.merging = true;
    bodyB.merging = true;

    var mx = (bodyA.position.x + bodyB.position.x) / 2;
    var my = (bodyA.position.y + bodyB.position.y) / 2;

    Composite.remove(engine.world, bodyA);
    Composite.remove(engine.world, bodyB);

    // WATERMELON MEGA EXPLOSION
    if (fruitIdx === FRUITS.length - 1) {
      score += 500; // bigger base reward
      updateHUD();
      playExplosionSound(true);

      var canvas = document.getElementById('game-canvas');
      var rect = canvas.getBoundingClientRect();
      // Mega particle burst
      spawnExplosion(rect.left + mx, rect.top + my, 2.8);
      // A second delayed burst for chunky feel
      setTimeout(function() { spawnExplosion(rect.left + mx, rect.top + my, 1.8); }, 120);
      shake(18, 700);

      // Big blast radius
      var blastRadius = 200;
      var allBodies = Composite.allBodies(engine.world).slice();
      for (var b = 0; b < allBodies.length; b++) {
        if (allBodies[b].fruitIndex === undefined) continue;
        var dist = Vector.magnitude(Vector.sub(allBodies[b].position, { x: mx, y: my }));
        if (dist < blastRadius) {
          score += FRUITS[allBodies[b].fruitIndex].points * 2; // bonus for blast kills
          Composite.remove(engine.world, allBodies[b]);
        }
      }
      updateHUD();
      if (score >= getLevelGoal(level)) levelUp();
      continue;
    }

    var newIdx = fruitIdx + 1;
    var newFruit = FRUITS[newIdx];
    var newR = getRadius(newIdx);

    var newBody = Bodies.circle(mx, my, newR, {
      restitution: 0.2,
      friction: 0.5,
      density: 0.001 + newIdx * 0.0005,
      render: {
        fillStyle: 'rgba(0,0,0,0.01)',
        strokeStyle: 'rgba(0,0,0,0)',
        lineWidth: 0
      },
      label: 'fruit'
    });
    newBody.fruitIndex = newIdx;
    newBody.justDropped = true;
    setTimeout(function(b) { b.justDropped = false; }.bind(null, newBody), 100);

    Composite.add(engine.world, newBody);

    registerMerge(newFruit.points);
    updateHUD();
    playMergeSound(newIdx);

    // Mild shake on big merges
    if (newIdx >= 7) shake(3 + newIdx * 0.5, 250);

    if (score >= getLevelGoal(level)) {
      levelUp();
    }
  }
}

// ── Game over check ───────────────────────
function scheduleGameOverCheck() {
  if (checkGameOverTimeout) clearTimeout(checkGameOverTimeout);
  checkGameOverTimeout = setTimeout(checkGameOver, 2000);
}

// Periodic danger warning check while playing
setInterval(function() {
  if (!gameStarted || gameOver || paused) return;
  var bodies = Composite.allBodies(engine.world);
  var warnLine = 110;
  for (var i = 0; i < bodies.length; i++) {
    var body = bodies[i];
    if (body.fruitIndex === undefined || body.justDropped) continue;
    var bodyR = body.circleRadius || FRUITS[body.fruitIndex].radius;
    if (body.position.y - bodyR < warnLine && Vector.magnitude(body.velocity) < 2) {
      var now = performance.now();
      if (now - lastDangerWarnTime > 900) {
        lastDangerWarnTime = now;
        playDangerWarning();
      }
      return;
    }
  }
}, 500);

var lastDangerWarnTime = 0;
function checkGameOver() {
  if (gameOver || !gameStarted || paused) return;

  var bodies = Composite.allBodies(engine.world);
  var dangerLine = 70;
  var warnLine = 110; // a little below the danger line — early warning zone
  var nearDanger = false;

  for (var i = 0; i < bodies.length; i++) {
    var body = bodies[i];
    if (body.fruitIndex === undefined) continue;
    if (body.justDropped) continue;

    var bodyR = body.circleRadius || FRUITS[body.fruitIndex].radius;
    if (body.position.y - bodyR < dangerLine) {
      var speed = Vector.magnitude(body.velocity);
      if (speed < 1) {
        triggerGameOver();
        return;
      }
    }
    if (body.position.y - bodyR < warnLine) nearDanger = true;
  }

  if (nearDanger) {
    var now = performance.now();
    if (now - lastDangerWarnTime > 700) {
      lastDangerWarnTime = now;
      playDangerWarning();
    }
  }
}

function triggerGameOver() {
  gameOver = true;
  gameStarted = false;
  playGameOverSound();

  var isNewBest = score > bestScore;
  var hs = saveHighScore(score, level);

  document.getElementById('gameover-score').textContent = score;
  document.getElementById('gameover-level').textContent = 'Reached Level ' + level;
  var nb = document.getElementById('gameover-newbest');
  if (isNewBest && score > 0) {
    nb.classList.remove('hidden');
    setTimeout(playNewHighScoreSound, 450);
  } else {
    nb.classList.add('hidden');
  }
  renderHighScores('gameover-hs-board', hs, score);
  document.getElementById('screen-gameover').classList.remove('hidden');
}

// ── Level up ──────────────────────────────
function levelUp() {
  level++;
  playLevelUpSound();

  gameStarted = false;
  Runner.stop(runner);

  document.getElementById('levelup-text').textContent = 'Level ' + level;
  document.getElementById('levelup-score').textContent = score;

  var msgs = [
    'Fruits got bigger!',
    'Power-ups unlocked! 💣⭐',
    'Things are getting trickier...',
    'Can you reach the watermelon?',
    'More variety incoming!',
    'The pressure is on!',
    'Merge master!',
    'Unstoppable!',
    'Legendary merger!'
  ];
  document.getElementById('levelup-msg').textContent = msgs[Math.min(level - 2, msgs.length - 1)];
  document.getElementById('screen-levelup').classList.remove('hidden');
}

function nextLevel() {
  document.getElementById('screen-levelup').classList.add('hidden');

  engine.gravity.y = 1.5 + level * 0.15;

  updateHUD();
  gameStarted = true;
  canDrop = true;
  Runner.run(runner, engine);
}

// ── HUD ───────────────────────────────────
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = 'Level ' + level;
  document.getElementById('goal-text').textContent = 'Goal: ' + getLevelGoal(level);
  document.getElementById('best-text').textContent = 'Best: ' + bestScore;
}

// ── High scores (localStorage) ────────────
var HS_KEY = 'fruit-merge-highscores-v1';
function getHighScores() {
  try {
    var raw = localStorage.getItem(HS_KEY);
    if (!raw) return [];
    var arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch(e) { return []; }
}
function saveHighScore(s, lvl) {
  var hs = getHighScores();
  hs.push({ score: s, level: lvl, date: Date.now() });
  hs.sort(function(a, b) { return b.score - a.score; });
  hs = hs.slice(0, 5);
  try { localStorage.setItem(HS_KEY, JSON.stringify(hs)); } catch(e) {}
  bestScore = hs.length ? hs[0].score : 0;
  return hs;
}
function loadBestScore() {
  var hs = getHighScores();
  bestScore = hs.length ? hs[0].score : 0;
}
function renderHighScores(containerId, hs, currentScore) {
  var el = document.getElementById(containerId);
  hs = hs || getHighScores();
  var html = '<h3>🏆 HIGH SCORES</h3>';
  if (!hs.length) {
    html += '<div class="hs-empty">No scores yet — go play!</div>';
  } else {
    var medal = ['🥇','🥈','🥉','4.','5.'];
    var matched = false;
    for (var i = 0; i < hs.length; i++) {
      var entry = hs[i];
      var isCurrent = !matched && currentScore !== undefined && entry.score === currentScore;
      if (isCurrent) matched = true;
      html += '<div class="hs-row' + (isCurrent ? ' current' : '') + '">' +
              '<span><span class="hs-rank">' + medal[i] + '</span>Lv ' + entry.level + '</span>' +
              '<span>' + entry.score + '</span>' +
              '</div>';
    }
  }
  el.innerHTML = html;
}

// ── Pause / Mute ──────────────────────────
function togglePause() {
  if (!gameStarted && !paused) return;
  paused = !paused;
  var btn = document.getElementById('btn-pause');
  if (paused) {
    Runner.stop(runner);
    btn.textContent = '▶';
    btn.classList.add('active');
    showPauseBanner();
  } else {
    Runner.run(runner, engine);
    btn.textContent = '⏸';
    btn.classList.remove('active');
    hidePauseBanner();
  }
}
function showPauseBanner() {
  if (document.getElementById('pause-banner')) return;
  var b = document.createElement('div');
  b.id = 'pause-banner';
  b.className = 'pause-banner';
  b.textContent = '⏸ Paused';
  document.body.appendChild(b);
}
function hidePauseBanner() {
  var b = document.getElementById('pause-banner');
  if (b) b.remove();
}
function toggleMute() {
  muted = !muted;
  var btn = document.getElementById('btn-mute');
  btn.textContent = muted ? '🔇' : '🔊';
  if (muted) btn.classList.add('active'); else btn.classList.remove('active');
}

// ── Start / Restart ───────────────────────
function startGame() {
  document.getElementById('screen-start').classList.add('hidden');

  score = 0;
  level = 1;
  combo = 0;
  lastMergeTime = 0;
  gameOver = false;
  gameStarted = true;
  canDrop = true;
  paused = false;
  currentPowerUp = null;
  nextPowerUp = null;

  currentFruitIndex = Math.floor(Math.random() * 3);
  nextFruitIndex = Math.floor(Math.random() * 3);
  updateNextDisplay();

  updateHUD();
  initGame();
  setupInput();
}

function restartGame() {
  document.getElementById('screen-gameover').classList.add('hidden');

  if (runner) Runner.stop(runner);
  if (render) Render.stop(render);
  if (engine) {
    Composite.clear(engine.world, false);
    Engine.clear(engine);
  }

  score = 0;
  level = 1;
  combo = 0;
  lastMergeTime = 0;
  gameOver = false;
  gameStarted = true;
  canDrop = true;
  paused = false;
  currentPowerUp = null;
  nextPowerUp = null;

  currentFruitIndex = Math.floor(Math.random() * 3);
  nextFruitIndex = Math.floor(Math.random() * 3);
  updateNextDisplay();

  updateHUD();
  initGame();
  setupInput();
}

function goToStart() {
  document.getElementById('screen-gameover').classList.add('hidden');
  if (runner) Runner.stop(runner);
  if (render) Render.stop(render);
  if (engine) {
    Composite.clear(engine.world, false);
    Engine.clear(engine);
  }
  gameStarted = false;
  gameOver = false;
  renderHighScores('start-hs-board');
  document.getElementById('screen-start').classList.remove('hidden');
}

// Draw drop preview
(function drawPreviewLoop() {
  requestAnimationFrame(drawPreviewLoop);
  if (!gameStarted || gameOver || paused || !render) return;
  var ctx = render.context;
  if (!ctx) return;

  var displayEmoji, displaySize;
  if (currentPowerUp) {
    displayEmoji = POWERUPS[currentPowerUp].emoji;
    displaySize = 48;
  } else {
    var fruit = FRUITS[currentFruitIndex];
    displayEmoji = fruit.emoji;
    displaySize = Math.max(getRadius(currentFruitIndex) * 2.2, 16);
  }

  ctx.save();
  ctx.globalAlpha = currentPowerUp ? 0.85 : 0.5;
  ctx.fillStyle = '#000';
  ctx.font = displaySize + 'px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(displayEmoji, previewX, 40);
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(previewX, 40 + previewRadius());
  ctx.lineTo(previewX, containerHeight);
  ctx.strokeStyle = currentPowerUp ? '#ffd700' : '#fff';
  ctx.stroke();
  ctx.restore();
})();

// ── UI click sounds ───────────────────────
document.addEventListener('click', function(e) {
  var t = e.target;
  if (t && (t.classList.contains('btn') || t.classList.contains('icon-btn'))) {
    playClickSound();
  }
});

// ── Boot ──────────────────────────────────
loadBestScore();
renderHighScores('start-hs-board');
document.getElementById('best-text').textContent = 'Best: ' + bestScore;
</script>
